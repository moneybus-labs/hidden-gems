<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채상욱의 머니버스 | 멀티링크</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 1. 기본 뱃지를 우측 하단으로 이동 (유의, JOKER 등) */
        .bento-card .badge {
            top: auto !important;
            bottom: 0 !important;
            right: 0 !important;
            border-radius: 10px 0 14px 0 !important; 
        }
        
        /* 2. NEW 뱃지만 다시 우측 상단으로 이동 */
        .bento-card .badge-new {
            top: 0 !important;
            bottom: auto !important;
            right: 0 !important;
            border-radius: 0 14px 0 10px !important; 
        }
        
        /* 3. 카드 크기에 맞춘 폰트 및 아이콘 사이즈 세밀 조정 */
        /* 기본 1칸 (1x1) */
        .bento-card .card-text {
            font-size: 0.75rem !important; 
            line-height: 1.1 !important;
        }
        .bento-card .card-icon {
            font-size: 1.1rem !important;
            margin-bottom: 2px;
        }

        /* 가로 2칸(2x1) & 세로 2칸(1x2) - 폰트 사이즈와 스타일 완벽 동일하게 통일 */
        .bento-card.col-2 .card-text,
        .bento-card.row-2 .card-text {
            font-size: 0.9rem !important; /* 넘침 방지를 위해 0.9rem으로 타협 및 통일 */
            line-height: 1.3 !important;
        }
        .bento-card.col-2 .card-icon,
        .bento-card.row-2 .card-icon {
            font-size: 1.3rem !important;
            margin-bottom: 2.5px;
        }

        /* 가로세로 2칸 (2x2 큰 카드) - 가장 크게 강조 */
        .bento-card.col-2.row-2 .card-text {
            font-size: 1.15rem !important;
        }
        .bento-card.col-2.row-2 .card-icon {
            font-size: 2.5rem !important;
        }

        /* 가로 4칸 (4x1 조커 카드) */
        .bento-card.col-4 .card-text {
            font-size: 1.15rem !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-container">
            <img src="profile.png" alt="채상욱의 머니버스" class="profile-img">
        </div>

        <div class="header">
            <h1>채상욱의 머니버스</h1>
            <p>반갑습니다! <strong>머니버스</strong> 승객 여러분.
                <br>흔들리지 않는 편안함, <strong>머니버스</strong> 탑승을 환영합니다.
                <br>안전한 여행되십시오. 고맙습니다!
            </p>
        </div>

        <section class="commandments-section" id="capture-target">
            <h2 class="commandments-title">하지마라 17계명</h2>
            
            <div id="bento-grid-container" class="bento-grid"></div>

            <div class="download-container">
                <a href="#" onclick="downloadImage(); return false;" class="download-btn">
                    📥 17계명 이미지로 저장
                </a>
            </div>
        </section>

        <section class="etf-section">
            <h2 class="etf-section-title">관심 ETF 목록</h2>
            <div id="etf-container"></div>
        </section>

        <div id="links-container" class="links"></div>

        <div class="footer">
            &copy; 2026 채상욱의 머니버스. All Rights Reserved.
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-header">
                <span class="modal-icon"></span>
                <div>
                    <div class="modal-number"></div>
                    <h3 class="modal-title"></h3>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h4>핵심 논리</h4>
                    <p class="modal-logic"></p>
                </div>
                <div class="modal-section">
                    <h4>상세 배경</h4>
                    <p class="modal-detail"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" onerror="alert('스크립트 로드 실패!');"></script>
    <script src="data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderBentoGrid();
            renderEtfSection();
            renderLinks();
            setupModalEvents();
        });

        function renderEtfSection() {
            const container = document.getElementById('etf-container');
            if (!container) return;

            etfData.forEach(group => {
                const categoryEl = document.createElement('div');
                categoryEl.className = 'etf-category';

                const label = document.createElement('div');
                label.className = 'etf-category-label';
                label.textContent = group.category;
                categoryEl.appendChild(label);

                const list = document.createElement('div');
                list.className = 'etf-list';

                group.items.forEach(etf => {
                    const chip = document.createElement('div');
                    const brandClass = etf.brand ? `etf-brand-${etf.brand}` : 'etf-brand-none';
                    chip.className = `etf-chip ${brandClass}`;

                    const displayName = etf.nickname || etf.fullName;
                    const pendingBadge = etf.isPending ? `<span class="etf-pending-badge">미정</span>` : '';

                    chip.innerHTML = `
                        <div class="etf-nickname">${displayName}${pendingBadge}</div>
                        ${etf.nickname ? `<div class="etf-fullname">${etf.fullName}</div>` : ''}
                    `;
                    list.appendChild(chip);
                });

                categoryEl.appendChild(list);
                container.appendChild(categoryEl);
            });
        }

        function renderLinks() {
            const container = document.getElementById('links-container');
            if (!container) return;

            linksData.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = 'link-item';
                a.target = '_blank';

                const newBadge = item.isNew ? `<span class="badge-new">NEW</span>` : '';

                let contributorHTML = '';
                if (item.contributor) {
                    const avatar = item.contributor.githubId
                        ? `<img src="https://github.com/${item.contributor.githubId}.png" alt="${item.contributor.name}" class="avatar-vxs">`
                        : '';
                    contributorHTML = `
                        <div class="contributor-wrapper">
                            <span class="by-text">by</span>
                            <div class="contributor-chip">
                                ${avatar}
                                <span class="author-name">${item.contributor.name}</span>
                            </div>
                        </div>`;
                }

                a.innerHTML = `
                    <div class="link-content">
                        <span class="link-title">${item.title} ${newBadge}</span>
                        ${contributorHTML}
                    </div>`;

                container.appendChild(a);
            });
        }

        function renderBentoGrid() {
            const container = document.getElementById('bento-grid-container');
            if (!container) return;

            bentoData.forEach(item => {
                const card = document.createElement('div');
                
                let classList = ['bento-card'];
                if (item.bgClass) classList.push(item.bgClass);
                if (item.gridClass && item.gridClass.trim() !== '') {
                    classList.push(...item.gridClass.split(' '));
                }
                if (item.isJoker) classList.push('card-joker');
                
                card.className = classList.join(' ');
                
                let innerHTML = '';
                // 뱃지가 맨 먼저 추가되더라도 CSS(bottom, right) 때문에 우측 하단에 고정됩니다.
                if (item.badge) {
                    innerHTML += `<div class="badge ${item.badge.class}">${item.badge.text}</div>`;
                }

                if (item.isJoker) {
                    innerHTML += `
                        <div class="card-icon">${item.icon}</div>
                        <div>
                            <div class="section-num">§ ${String(item.id).padStart(2, '0')}</div>
                            <div class="card-text">${item.cardTitle}</div>
                        </div>
                    `;
                } else {
                    // 데이터에 인라인 스타일이 있으면 사용(현재는 싹 비웠음)
                    let titleStyle = item.cardTitleStyle ? ` style="${item.cardTitleStyle}"` : '';
                    innerHTML += `
                        <div class="card-header">
                            <span class="section-num">§ ${String(item.id).padStart(2, '0')}</span>
                            <span class="card-icon">${item.icon}</span>
                        </div>
                        <div class="card-text"${titleStyle}>${item.cardTitle}</div>
                    `;
                }
                
                card.innerHTML = innerHTML;
                card.style.cursor = 'pointer';
                card.addEventListener('click', () => openModal(item.id));
                
                container.appendChild(card);
            });
        }

        function openModal(id) {
            const data = bentoData.find(item => item.id === id);
            if (!data) return;

            const modal = document.getElementById('modal');
            const modalContent = modal.querySelector('.modal-content');
            
            modalContent.className = 'modal-content ' + (data.bgClass || '');
            modal.querySelector('.modal-icon').textContent = data.icon;
            modal.querySelector('.modal-number').textContent = `§ ${String(id).padStart(2, '0')}`;
            
            const formattedTitle = data.title.replace(/(\(.*\))/, '<span class="modal-title-sub">$1</span>');
            modal.querySelector('.modal-title').innerHTML = formattedTitle;
            
            modal.querySelector('.modal-logic').textContent = data.logic;
            modal.querySelector('.modal-detail').textContent = data.detail;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function setupModalEvents() {
            const modal = document.getElementById('modal');
            const backdrop = modal.querySelector('.modal-backdrop');
            const closeBtn = modal.querySelector('.modal-close');

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            };

            backdrop.addEventListener('click', closeModal);
            closeBtn.addEventListener('click', closeModal);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
            });
        }

        function downloadImage() {
            if (typeof html2canvas === 'undefined') {
                alert("기능이 아직 로드되지 않았습니다. 잠시 후 다시 시도해주세요.");
                return;
            }

            const target = document.getElementById('capture-target');
            document.body.style.cursor = 'wait';

            html2canvas(target, {
                scale: 3, 
                backgroundColor: "#ffffff",
                useCORS: true,
                onclone: function(clonedDoc) {
                    const btn = clonedDoc.querySelector('.download-container');
                    if (btn) btn.style.display = 'none';
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '채상욱의_머니버스_17계명.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
                document.body.style.cursor = 'default';
            }).catch(err => {
                console.error('캡처 실패:', err);
                alert('이미지 저장 중 오류가 발생했습니다.');
                document.body.style.cursor = 'default';
            });
        }
    </script>
</body>
</html>
